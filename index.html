<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>手ざわり手帳</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="手ざわり手帳">
<meta name="theme-color" content="#2b251f">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="manifest" href="manifest.webmanifest">
<!-- 手書き風フォント（Klee One を自前ホスト。fonts/OFL.txt がライセンス）。
     unicode-range分割なので実際に読む文字のサブセットだけがダウンロードされる -->
<link href="fonts/fonts.css" rel="stylesheet">
<!-- Googleカレンダー連携（GIS）。読み込みは非同期、使うのは連携ボタンを押したときだけ -->
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  /* 描画が届かない領域（iOSの下端など）が白く見えないよう、下地も机の色にしておく */
  html { background: #2b251f; }

  /* 紙の色（設定で選べる）。紙面・紙の裏・インク・罫線まで紙ごとに連動するテーマ変数 */
  :root {
    --paper: #fdf8ea; /* アイボリー（既定。クリームは2026-07-13廃止） */
    --paper-back-1: #f4eeda;
    --paper-back-2: #faf4e6;
    --paper-back-3: #ebe4d0;
    --ink-strong: #454a58;   /* 日付など */
    --ink-text: #4a4e5c;     /* 本文 */
    --ink-soft: #8a8d99;     /* わき役 */
    --placeholder: rgba(122, 126, 140, 0.4);
    --rule: rgba(122, 158, 196, 0.38);       /* 罫線 */
    --rule-strong: rgba(122, 158, 196, 0.55);
    --margin-line: rgba(214, 130, 122, 0.55); /* 赤マージン線 */
    --print: #5d6f93;        /* 印刷された予定 */
    --print-soft: #8291b0;
    --sun: #c4645c;
    --sat: #5b7fa6;
    --today-ring: rgba(200, 80, 70, 0.75);
    --stitch: rgba(120, 100, 70, 0.4);
    --divider-label: #b08a84;
    --mark: rgba(58, 60, 72, 0.4);
    --mg-border: rgba(110, 130, 160, 0.3);
    --corner: rgba(180, 160, 120, 0.25);
    --shade-rgb: 60, 40, 20; /* めくりの陰影 */
  }
  body[data-paper="white"] {
    --paper: #fcfcfb;
    --paper-back-1: #f1f0ed;
    --paper-back-2: #f8f7f5;
    --paper-back-3: #e8e7e3;
  }
  /* 黒いノート（白ペンで書く） */
  body[data-paper="black"] {
    --paper: #23252a;
    --paper-back-1: #1c1e22;
    --paper-back-2: #26282e;
    --paper-back-3: #17181c;
    --ink-strong: #e8e6df;
    --ink-text: #dfdcd2;
    --ink-soft: #9a9890;
    --placeholder: rgba(255, 255, 255, 0.28);
    --rule: rgba(255, 255, 255, 0.14);
    --rule-strong: rgba(255, 255, 255, 0.28);
    --margin-line: rgba(235, 140, 130, 0.55);
    --print: #9fb4d8;
    --print-soft: #7f92b5;
    --sun: #e08a80;
    --sat: #8fa9d0;
    --today-ring: rgba(235, 130, 120, 0.8);
    --stitch: rgba(255, 255, 255, 0.22);
    --divider-label: #c9a49e;
    --mark: rgba(232, 230, 222, 0.45);
    --mg-border: rgba(255, 255, 255, 0.16);
    --corner: rgba(255, 255, 255, 0.12);
    --shade-rgb: 0, 0, 0;
  }
  /* 電光掲示板（駅の発車標。アンバーLED＋緑LED） */
  body[data-paper="led"] {
    --paper: #0e1013;
    --paper-back-1: #0a0c0e;
    --paper-back-2: #14161a;
    --paper-back-3: #07080a;
    --ink-strong: #ffb02e;
    --ink-text: #ffa41f;
    --ink-soft: #9a7b45;
    --placeholder: rgba(255, 164, 31, 0.3);
    --rule: rgba(255, 176, 46, 0.12);
    --rule-strong: rgba(255, 176, 46, 0.3);
    --margin-line: rgba(255, 176, 46, 0.25);
    --print: #58e07a;        /* 予定は緑LED */
    --print-soft: #3da65a;
    --sun: #ff6259;
    --sat: #57c8ff;
    --today-ring: rgba(255, 176, 46, 0.85);
    --stitch: rgba(255, 255, 255, 0.14);
    --divider-label: #c88f3a;
    --mark: rgba(255, 164, 31, 0.55);
    --mg-border: rgba(255, 176, 46, 0.14);
    --corner: rgba(255, 176, 46, 0.14);
    --shade-rgb: 0, 0, 0;
  }

  /* 黒板（チョークで書く） */
  body[data-paper="board"] {
    --paper: #33584a;
    --paper-back-1: #2a4b3e;
    --paper-back-2: #37604f;
    --paper-back-3: #24413a;
    --ink-strong: #f0ede2;
    --ink-text: #e7e4d8;
    --ink-soft: #a8b3a5;
    --placeholder: rgba(255, 255, 255, 0.3);
    --rule: rgba(255, 255, 255, 0.16);
    --rule-strong: rgba(255, 255, 255, 0.3);
    --margin-line: rgba(255, 190, 180, 0.5);
    --print: #b8cfe4;
    --print-soft: #93a9bd;
    --sun: #f0a8a0;
    --sat: #a8c4e8;
    --today-ring: rgba(240, 168, 160, 0.85);
    --stitch: rgba(255, 255, 255, 0.25);
    --divider-label: #d8b8b2;
    --mark: rgba(240, 238, 228, 0.5);
    --mg-border: rgba(255, 255, 255, 0.18);
    --corner: rgba(255, 255, 255, 0.12);
    --shade-rgb: 0, 0, 0;
  }

  /* 机（背景）。木目っぽい暗色で紙を引き立てる */
  body {
    background:
      radial-gradient(ellipse at 50% 30%, rgba(255, 244, 214, 0.10), transparent 60%),
      linear-gradient(160deg, #3a322b, #2b251f 55%, #241f1a);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Klee One', 'Yomogi', cursive;
    -webkit-user-select: none;
    user-select: none;
    touch-action: manipulation;
  }

  /* ノート本体。perspectiveの中でページがめくれる */
  .book {
    position: relative;
    width: min(92vw, 420px);
    height: min(78vh, 640px);
    perspective: 1600px;
    /* 縦はネイティブスクロールに残し、横の動きはJSのめくりが受け取る */
    touch-action: pan-y;
  }
  .page-text { touch-action: pan-y; }

  /* ノートの下に重なって見える「これまでのページの束」 */
  .book::before {
    content: '';
    position: absolute;
    inset: 4px -6px -8px 2px;
    background: var(--paper-back-2);
    border-radius: 4px 10px 10px 4px;
    box-shadow:
      2px 3px 0 #ddd5c2,
      4px 6px 0 #d2c9b4,
      6px 10px 18px rgba(0, 0, 0, 0.55);
  }

  /* ページ共通の紙面。紙色＋粒状感＋罫線＋左の赤いマージン線 */
  .paper {
    position: absolute;
    inset: 0;
    background-color: var(--paper);
    background-image:
      /* 紙の粒（SVGノイズ） */
      url("data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='120' height='120'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/%3E%3CfeColorMatrix values='0 0 0 0 0.42 0 0 0 0 0.38 0 0 0 0 0.32 0 0 0 0.05 0'/%3E%3C/filter%3E%3Crect width='120' height='120' filter='url(%23n)'/%3E%3C/svg%3E"),
      /* 横罫線 */
      repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 27px,
        var(--rule) 27px,
        var(--rule) 28px
      ),
      /* 左の赤いマージン線 */
      linear-gradient(to right, transparent 46px, var(--margin-line) 46px, var(--margin-line) 47.5px, transparent 47.5px);
    background-position: 0 0, 0 88px, 0 0;
    border-radius: 3px 9px 9px 3px;
    box-shadow: inset 12px 0 22px -14px rgba(90, 70, 40, 0.5);
    overflow: hidden;
  }

  /* 月のカレンダーのページは無地（罫線・赤線なし）。
     カレンダー自身の行線と日記用罫線のリズムが揃わずズレて見えるため、月間は格子だけにする */
  .paper.is-month {
    background-image:
      url("data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='120' height='120'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/%3E%3CfeColorMatrix values='0 0 0 0 0.42 0 0 0 0 0.38 0 0 0 0 0.32 0 0 0 0.05 0'/%3E%3C/filter%3E%3Crect width='120' height='120' filter='url(%23n)'/%3E%3C/svg%3E");
    background-position: 0 0;
  }

  /* 綴じ（左端のステッチ） */
  .paper::before {
    content: '';
    position: absolute;
    top: 10px;
    bottom: 10px;
    left: 10px;
    width: 0;
    border-left: 2.5px dashed var(--stitch);
  }

  /* 日付ヘッダー（鉛筆で書いたタイトル風） */
  .page-date {
    position: absolute;
    top: 22px;
    left: 60px;
    right: 18px;
    color: var(--ink-strong);
    line-height: 1.15;
    pointer-events: none;
  }
  .page-date .big {
    font-size: 30px;
    font-weight: 600;
    letter-spacing: 0.04em;
  }
  .page-date .small {
    display: block;
    font-size: 13px;
    color: var(--ink-soft);
    margin-top: 2px;
  }
  .page-date .dow-sun { color: var(--sun); }
  .page-date .dow-sat { color: var(--sat); }
  .page-date .big.is-holiday { color: var(--sun); }
  .page-date .holiday-name { color: var(--sun); margin-left: 8px; }
  .page-date .rokuyo-name { color: var(--ink-soft); margin-left: 8px; }

  /* 本文エリア（計画＋日記の2区画）。罫線に行の高さを合わせる */
  .page-body {
    position: absolute;
    top: 88px;
    left: 0;
    right: 0;
    bottom: 0;
    display: flex;
    flex-direction: column;
    padding-bottom: 14px;
  }
  .page-text {
    border: 0;
    background: transparent;
    resize: none;
    outline: none;
    /* 自分が書く欄だけ手書きフォント（設定で選べる。印刷部分はKlee Oneのまま） */
    font-family: var(--write-font, 'Shippori Mincho'), 'Klee One', serif;
    font-size: 17px;
    line-height: 28px;
    color: var(--ink-text);
    caret-color: var(--ink-text);
    padding: 0 16px 0 56px;
    width: 100%;
    overflow-y: auto;
  }
  .page-text::placeholder { color: var(--placeholder); }
  .page-text.plan { flex: none; height: 308px; } /* 罫線11行ぶん */
  .page-text.diary { flex: 1 1 auto; min-height: 0; }
  /* 日記の区切り（左の余白に「日記」、少し濃い罫線） */
  .page-divider {
    flex: none;
    height: 28px;
    position: relative;
    border-bottom: 1.5px solid var(--rule-strong);
  }
  .page-divider .label {
    position: absolute;
    left: 17px; /* 綴じステッチと赤線の間の余白に置く */
    bottom: 3px;
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--divider-label);
  }

  /* その日のカレンダー予定（手帳に印刷されている風。書き込みとは違うインク） */
  .page-events {
    position: absolute;
    top: calc(88px + env(safe-area-inset-top, 0px));
    left: 0;
    right: 0;
    padding: 0 16px 0 0; /* 左余白は.page-event側（時刻を赤線の左に置くため親は0） */
    pointer-events: none;
    display: none;
  }
  .page-event {
    position: relative;
    height: 28px;
    line-height: 28px;
    padding-left: 56px; /* タイトルは赤線の右、本文と同じ書き出し位置 */
    /* 予定は「自分で転記した」もの。選んだ書き字に追従する（色で書き込みと区別）。
       大きさも書き込み欄と同じ17pxで統一 */
    font-family: var(--write-font, 'Shippori Mincho'), 'Klee One', serif;
    font-size: 17px;
    color: var(--print);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  /* 時刻は赤いマージン線の左の余白に小さく。
     上段（開始時刻）は左寄せ、下段（〜終了時刻）は右寄せの筆記スタイル */
  .page-event .ev-time {
    position: absolute;
    left: 14px; /* 綴じステッチ(10px)と赤線(46px)の間に収める */
    top: 0;
    width: 30px;
    height: 28px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    font-size: 9.5px;
    line-height: 11px;
    letter-spacing: 0;
    color: var(--print-soft);
  }
  .page-event .ev-time span:first-child { align-self: flex-start; }
  .page-event .ev-time span + span { align-self: flex-end; }

  /* めくり中の「1枚の紙」。前面=今のページ、背面=紙の裏 */
  .leaf {
    position: absolute;
    inset: 0;
    transform-origin: left center;
    transform-style: preserve-3d;
    transition: transform 0.62s cubic-bezier(0.35, 0.1, 0.25, 1);
    z-index: 30;
    pointer-events: none;
  }
  /* 紙のしなり: めくる1枚を左右2枚の蝶番構造にして、外側の半分が遅れてついてくる */
  .leaf-half {
    position: absolute;
    top: 0;
    bottom: 0;
    width: 50%;
    transform-style: preserve-3d;
  }
  .leaf-half.hl { left: 0; }
  .leaf-half.hr {
    left: 50%;
    transform-origin: left center; /* 折り目（ページの中央）が蝶番 */
  }
  .leaf-half .face {
    position: absolute;
    inset: 0;
    overflow: hidden;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
  }
  /* ページのクローンを半分ずつ見せる窓 */
  .leaf-half .holder {
    position: absolute;
    top: 0;
    bottom: 0;
    width: 200%;
  }
  .leaf-half.hl .holder { left: 0; }
  .leaf-half.hr .holder { left: -100%; }
  .leaf-half .face.back {
    transform: rotateY(180deg);
    background:
      url("data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='120' height='120'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/%3E%3CfeColorMatrix values='0 0 0 0 0.42 0 0 0 0 0.38 0 0 0 0 0.32 0 0 0 0.04 0'/%3E%3C/filter%3E%3Crect width='120' height='120' filter='url(%23n)'/%3E%3C/svg%3E"),
      linear-gradient(105deg, var(--paper-back-1), var(--paper-back-2) 40%, var(--paper-back-3));
  }
  /* しなりに合わせて濃くなる陰影（折り目まわり） */
  .leaf-shade {
    position: absolute;
    inset: 0;
    opacity: 0;
    pointer-events: none;
  }
  .leaf-half.hl .leaf-shade {
    background: linear-gradient(90deg, transparent 40%, rgba(var(--shade-rgb), 0.22));
  }
  .leaf-half.hr .leaf-shade {
    background: linear-gradient(90deg, rgba(var(--shade-rgb), 0.26), transparent 55%);
  }
  /* めくり中、下のページの根元に落ちる影 */
  #flipShadow {
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 36%;
    background: linear-gradient(90deg, rgba(var(--shade-rgb), 0.4), transparent);
    opacity: 0;
    pointer-events: none;
    z-index: 25; /* ページ(下)とめくる紙(30)の間 */
  }
  /* ボタン・タブからの自動めくりでも紙がしなるように */
  @keyframes bendFwd { 0%, 100% { transform: rotateY(0deg); } 45% { transform: rotateY(15deg); } }
  @keyframes bendBack { 0%, 100% { transform: rotateY(0deg); } 45% { transform: rotateY(-15deg); } }
  @keyframes shadePulse { 0%, 100% { opacity: 0; } 45% { opacity: 1; } }
  .leaf.auto-fwd .leaf-half.hr { animation: bendFwd 0.46s ease; }
  .leaf.auto-back .leaf-half.hr { animation: bendBack 0.46s ease; }
  .leaf.auto-fwd .leaf-shade, .leaf.auto-back .leaf-shade { animation: shadePulse 0.46s ease; }
  #flipShadow.pulse { animation: shadePulse 0.46s ease; }

  /* 右端のインデックスタブ */
  .book-tabs {
    position: absolute;
    right: 0;
    top: 130px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    z-index: 20; /* ページ(下)とめくり中の紙(30)の間 */
  }
  .book-tab {
    width: 32px;
    height: 46px;
    border: 1px solid rgba(120, 100, 60, 0.35);
    border-right: none;
    border-radius: 9px 0 0 9px;
    background: linear-gradient(180deg, #ece4cf, #ded5bc);
    color: #6b6046;
    font-family: inherit;
    font-size: 15px;
    padding: 0;
    cursor: pointer;
    box-shadow: -2px 2px 5px rgba(60, 45, 25, 0.18);
  }
  .book-tab.active {
    background: linear-gradient(180deg, #f8f3e6, #efe8d6);
    color: #454a58;
    width: 38px;
    font-weight: 600;
  }

  /* 月のカレンダーページ */
  .month-grid {
    position: absolute;
    top: 96px;
    left: 18px;
    right: 14px;
    /* 下端は常に選択日パネル(146px)の上。パネルの出入りでカレンダーは動かない */
    bottom: calc(218px + env(safe-area-inset-bottom, 0px));
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    grid-template-rows: 24px;
    grid-auto-rows: 1fr;
  }
  .mg-head {
    font-size: 12px;
    color: var(--ink-soft);
    text-align: center;
    align-self: center;
  }
  .mg-head.dow-sun { color: var(--sun); }
  .mg-head.dow-sat { color: var(--sat); }
  .mg-cell {
    border-top: 1px solid var(--mg-border);
    padding: 2px 3px;
    position: relative;
    font-size: 15px;
    color: var(--ink-text);
    cursor: pointer;
    min-height: 0;
  }
  .mg-cell .num {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 24px;
    height: 24px;
    line-height: 1;
  }
  .mg-cell .num.dow-sun { color: var(--sun); }
  .mg-cell .num.dow-sat { color: var(--sat); }
  /* 今日: 赤鉛筆で囲んだ丸（少し歪ませて手描き感） */
  .mg-cell .num.today {
    border: 2px solid var(--today-ring);
    border-radius: 52% 46% 50% 48% / 48% 52% 46% 52%;
    transform: rotate(-4deg);
  }
  /* 書き込みがある日: 鉛筆の短い線（マス下端。予定表示と重ならない位置） */
  .mg-cell .mark {
    position: absolute;
    left: 7px;
    bottom: 4px;
    transform: rotate(-2deg);
    width: 16px;
    height: 3px;
    border-radius: 2px;
    background: var(--mark);
  }
  /* マス内の予定（小さな印刷。2件まで＋あふれは+n） */
  .mg-evs {
    position: absolute;
    top: 40px;
    left: 2px;
    right: 2px;
    overflow: hidden;
  }
  .mg-ev {
    font-family: var(--write-font, 'Shippori Mincho'), 'Klee One', serif; /* 予定は転記したもの。書く字に追従（page-eventと同じ方針） */
    font-size: 9px;
    line-height: 12px;
    color: var(--print);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .mg-ev.more {
    color: var(--ink-soft);
  }
  /* 祝日名（印刷風に小さく赤） */
  .mg-holiday {
    font-size: 8.5px;
    line-height: 1.15;
    color: var(--sun);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  /* 六曜（セルの右上に小さくグレー） */
  .mg-rokuyo {
    position: absolute;
    top: 4px;
    right: 3px;
    font-size: 8px;
    color: var(--ink-soft);
  }

  /* 週の見開き。日ごとに横1行、左に日付、右に予定を並べる */
  .week-grid {
    position: absolute;
    top: 96px;
    left: 18px;
    right: 14px;
    bottom: 14px;
    display: flex;
    flex-direction: column;
  }
  .wg-row {
    flex: 1 1 0;
    min-height: 0;
    display: flex;
    align-items: stretch;
    border-top: 1px solid var(--mg-border);
    cursor: pointer;
    position: relative;
  }
  .wg-row:last-child { border-bottom: 1px solid var(--mg-border); }
  .wg-date {
