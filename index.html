<script>
(function () {
  'use strict';

  // ---- 日付ユーティリティ ----
  var DOW = ['日', '月', '火', '水', '木', '金', '土'];

  function toISO(d) {
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
  }

  function fromISO(iso) {
    var p = iso.split('-');
    return new Date(+p[0], +p[1] - 1, +p[2]);
  }

  function addDays(iso, n) {
    var d = fromISO(iso);
    d.setDate(d.getDate() + n);
    return toISO(d);
  }

  // 和暦（令和のみ対応。プロトタイプには十分）
  function warekiOf(d) {
    var y = d.getFullYear() - 2018;
    return '令和' + (y === 1 ? '元' : y) + '年';
  }

  var currentISO = toISO(new Date());
  // ビューは 'day:YYYY-MM-DD'（日のページ）'week:YYYY-MM-DD'（週の見開き・その週の始まりの日）'month:YYYY-MM'（月のカレンダー）
  var currentView = 'day:' + currentISO;

  function viewParts(view) {
    var p = view.split(':');
    if (p[0] === 'month') {
      var ym = p[1].split('-');
      return { type: 'month', y: +ym[0], m: +ym[1] };
    }
    if (p[0] === 'week') {
      return { type: 'week', iso: p[1] };
    }
    return { type: 'day', iso: p[1] };
  }

  // 前後のページ（日ページなら前後の日、週なら前後の週、月ページなら前後の月）
  function stepView(view, dir) {
    var v = viewParts(view);
    if (v.type === 'day') return 'day:' + addDays(v.iso, dir);
    if (v.type === 'week') return 'week:' + addDays(v.iso, dir * 7);
    var m = v.m + dir, y = v.y;
    if (m < 1) { m = 12; y -= 1; }
    if (m > 12) { m = 1; y += 1; }
    return 'month:' + y + '-' + String(m).padStart(2, '0');
  }

  function hasEntry(iso) {
    return !!((localStorage.getItem(keyText(iso)) || '').trim() ||
      (localStorage.getItem(keyDiary(iso)) || '').trim());
  }

  // 週の始まり（0=日〜6=土）。月のカレンダーの列順・週見開きの範囲に効く
  function getWeekStart() {
    var v = parseInt(localStorage.getItem('pt:weekStart'), 10);
    return (v >= 0 && v <= 6) ? v : 0;
  }

  // isoを含む週の始まりの日（設定の週の始まりに追従）。週ビューの正規化に使う
  function weekStartISO(iso) {
    var d = fromISO(iso);
    var diff = (d.getDay() - getWeekStart() + 7) % 7;
    return addDays(iso, -diff);
  }

  // ---- 暦（祝日・六曜） ----
  // 祝日: 2026〜2027年（振替休日・国民の休日込み。内閣府の祝日法に基づく）
  var HOLIDAYS = {
    '2026-01-01': '元日', '2026-01-12': '成人の日', '2026-02-11': '建国記念の日',
    '2026-02-23': '天皇誕生日', '2026-03-20': '春分の日', '2026-04-29': '昭和の日',
    '2026-05-03': '憲法記念日', '2026-05-04': 'みどりの日', '2026-05-05': 'こどもの日',
    '2026-05-06': '振替休日', '2026-07-20': '海の日', '2026-08-11': '山の日',
    '2026-09-21': '敬老の日', '2026-09-22': '国民の休日', '2026-09-23': '秋分の日',
    '2026-10-12': 'スポーツの日', '2026-11-03': '文化の日', '2026-11-23': '勤労感謝の日',
    '2027-01-01': '元日', '2027-01-11': '成人の日', '2027-02-11': '建国記念の日',
    '2027-02-23': '天皇誕生日', '2027-03-21': '春分の日', '2027-03-22': '振替休日',
    '2027-04-29': '昭和の日', '2027-05-03': '憲法記念日', '2027-05-04': 'みどりの日',
    '2027-05-05': 'こどもの日', '2027-07-19': '海の日', '2027-08-11': '山の日',
    '2027-09-20': '敬老の日', '2027-09-23': '秋分の日', '2027-10-11': 'スポーツの日',
    '2027-11-03': '文化の日', '2027-11-23': '勤労感謝の日'
  };

  // 六曜: 旧暦の (月+日)%6 で決まる。朔日（旧暦各月1日）の新暦日付と旧暦月番号を持てば計算できる。
  // 下の朔日データは公開の旧暦・六曜カレンダー複数と突き合わせて検証済み（2026-11-10大安、
  // 2027-01-08赤口、2027-09-30先負、2027-10-29仏滅、2026-07-13先負=旧5/29 など）。
  // この範囲(2026-01-01〜2028-01-下旬)に閏月はない。範囲外は表示しない（誤った暦を出さない）
  var KYUREKI_LUNATIONS = [
    ['2025-12-20', 11], ['2026-01-19', 12], ['2026-02-17', 1], ['2026-03-19', 2],
    ['2026-04-17', 3], ['2026-05-17', 4], ['2026-06-15', 5], ['2026-07-14', 6],
    ['2026-08-13', 7], ['2026-09-11', 8], ['2026-10-11', 9], ['2026-11-09', 10],
    ['2026-12-09', 11], ['2027-01-08', 12], ['2027-02-07', 1], ['2027-03-08', 2],
    ['2027-04-06', 3], ['2027-05-06', 4], ['2027-06-05', 5], ['2027-07-04', 6],
    ['2027-08-02', 7], ['2027-09-01', 8], ['2027-09-30', 9], ['2027-10-29', 10],
    ['2027-11-28', 11], ['2027-12-28', 12]
  ];
  var ROKUYO_NAMES = ['大安', '赤口', '先勝', '友引', '先負', '仏滅'];

  function rokuyoOf(iso) {
    var found = null;
    for (var i = KYUREKI_LUNATIONS.length - 1; i >= 0; i--) {
      if (KYUREKI_LUNATIONS[i][0] <= iso) { found = KYUREKI_LUNATIONS[i]; break; }
    }
    if (!found) return '';
    var d = Math.round((fromISO(iso) - fromISO(found[0])) / 86400000) + 1;
    if (d > 30) return ''; // データ範囲外
    return ROKUYO_NAMES[(found[1] + d) % 6];
  }

  function getRokuyoEnabled() {
    return localStorage.getItem('pt:rokuyo') !== '0';
  }

  // ---- 二十四節気のイラスト（試作。まず4つだけ。日付は一般的な暦の目安で年により前後1日ずれることがある）----
  // [開始日, キー]。キーがnullの区間は未対応（イラストなし）。開始日昇順で並べ、iso以下で最後に一致した区間を採用
  var SEKKI_ILLUST_RANGES = [
    ['2026-01-01', null],
    ['2026-07-07', 'shosho'],   // 小暑
    ['2026-07-22', 'taisho'],   // 大暑
    ['2026-08-07', 'risshuu'],  // 立秋
    ['2026-08-23', 'shosho2'],  // 処暑
    ['2026-09-07', null],
    ['2027-07-07', 'shosho'],
    ['2027-07-23', 'taisho'],
    ['2027-08-08', 'risshuu'],
    ['2027-08-23', 'shosho2'],
    ['2027-09-08', null]
  ];

  function sekkiIllustKey(iso) {
    var found = null;
    for (var i = SEKKI_ILLUST_RANGES.length - 1; i >= 0; i--) {
      if (SEKKI_ILLUST_RANGES[i][0] <= iso) { found = SEKKI_ILLUST_RANGES[i]; break; }
    }
    return found ? found[1] : null;
  }

  // チョークの一筆書き風、線画のみ（currentColorで紙テーマに追従）
  var SEKKI_SVGS = {
    // 小暑: 木の枝にとまる蝉
    shosho: '<svg viewBox="0 0 64 64"><path d="M6 46c10-2 46-2 54 1"/><ellipse cx="30" cy="30" rx="6" ry="11"/>' +
      '<path d="M30 21c-3-7-11-10-18-8 4 6 10 9 18 8z"/><path d="M30 21c3-7 11-10 18-8-4 6-10 9-18 8z"/>' +
      '<path d="M27 40c-2 3-5 4-8 4"/><path d="M33 40c2 3 5 4 8 4"/></svg>',
    // 大暑: ひまわり
    taisho: '<svg viewBox="0 0 64 64"><path d="M32 40v20"/><path d="M32 52c-4 2-7 6-7 6"/><circle cx="32" cy="26" r="7"/>' +
      '<path d="M32 15c1 3 1 5 0 8"/><path d="M43 20c-2 2-4 3-7 4"/><path d="M46 30c-3 0-5-1-7-3"/>' +
      '<path d="M40 40c-2-2-3-4-3-7"/><path d="M24 40c2-2 3-4 3-7"/><path d="M18 30c3 0 5-1 7-3"/>' +
      '<path d="M21 20c2 2 4 3 7 4"/></svg>',
    // 立秋: とんぼ
    risshuu: '<svg viewBox="0 0 64 64"><path d="M14 30c14-4 22-4 36 0"/>' +
      '<ellipse cx="30" cy="24" rx="12" ry="3.5" transform="rotate(-18 30 24)"/>' +
      '<ellipse cx="34" cy="36" rx="12" ry="3.5" transform="rotate(14 34 36)"/><circle cx="14" cy="29" r="2.6"/></svg>',
    // 処暑: すすきと三日月
    shosho2: '<svg viewBox="0 0 64 64"><path d="M46 14a10 10 0 1 0 0 20 8 8 0 1 1 0-20z"/>' +
      '<path d="M14 50c2-14 4-24 6-30"/><path d="M22 50c1-16 2-24 2-32"/><path d="M30 50c-1-14 0-22 3-30"/>' +
      '<path d="M14 50h20"/></svg>'
  };

  function seasonDecoEl(cls, iso) {
    var key = sekkiIllustKey(iso);
    if (!key || !SEKKI_SVGS[key]) return null;
    var el = document.createElement('div');
    el.className = 'season-deco ' + cls;
    el.innerHTML = SEKKI_SVGS[key];
    return el;
  }

  // 紙の色。CSS変数で紙面・紙の裏・罫線・文字の色味が連動する。
  // [id, 表示名, 見本の背景色, 見本の文字色, premium]
  var PAPER_COLORS = [
    ['ivory', 'アイボリー', '#fdf8ea', '#4a4e5c', false],
    ['white', '白', '#fcfcfb', '#4a4e5c', false],
    ['black', '黒', '#23252a', '#e8e6df', false],
    ['board', '黒板', '#33584a', '#f0ede2', true],
    ['led', '電光掲示板', '#0e1013', '#ffb02e', true]
  ];

  function getPaperColor() {
    var v = localStorage.getItem('pt:paper');
    // クリーム（廃止）や不正値・未解放のプレミアムはアイボリーへ
    var hit = PAPER_COLORS.filter(function (c) { return c[0] === v && (!c[4] || isPremiumUser()); })[0];
    return hit ? hit[0] : 'ivory';
  }

  // 書く欄のフォント。無料2種＋プレミアム（🔒・準備中。課金実装時にフォント本体を同梱する）
  var WRITE_FONTS = [
    ['mincho', '明朝', "'Shippori Mincho'", false],
    ['yomogi', 'えんぴつ', "'Yomogi'", false],
    ['klee', 'きれい', "'Klee One'", true],
    ['pen', 'ボールペン', "'Zen Kurenaido'", true],
    ['magic', 'マジック', "'Yusei Magic'", true],
    ['maru', 'まるもじ', "'Hachi Maru Pop'", true],
    ['fude', 'ふで', "'Yuji Boku'", true]
  ];

  function isPremiumUser() {
    // 今の段階（IAP未実装）は全機能を開放しておく（2026-07-13ユーザー決定）。
    // 課金実装時にレシート判定へ差し替え、falseが既定になる
    return true;
  }

  function getWriteFont() {
    var v = localStorage.getItem('pt:font');
    var hit = WRITE_FONTS.filter(function (f) { return f[0] === v && (!f[3] || isPremiumUser()); })[0];
    return hit ? hit[0] : 'mincho';
  }

  function applyWriteFont() {
    var id = getWriteFont();
    var def = WRITE_FONTS.filter(function (f) { return f[0] === id; })[0];
    document.body.style.setProperty('--write-font', def[2]);
  }

  function applyPaperColor() {
    document.body.setAttribute('data-paper', getPaperColor());
  }

  // ---- ストレージ ----
  function keyText(iso) { return 'pt:' + iso + ':text'; }
  function keyDiary(iso) { return 'pt:' + iso + ':diary'; }

  var saveNoteTimer = 0;
  function flashSaved() {
    var el = document.getElementById('saveNote');
    el.classList.add('show');
    clearTimeout(saveNoteTimer);
    saveNoteTimer = setTimeout(function () { el.classList.remove('show'); }, 900);
  }

  // ---- ページの中身を組み立てる ----
  function dowClass(d) {
    if (d.getDay() === 0) return 'dow-sun';
    if (d.getDay() === 6) return 'dow-sat';
    return '';
  }

  function buildPageContent(view, interactive) {
    var v = viewParts(view);
    var frag = document.createDocumentFragment();
    var head = document.createElement('div');
    head.className = 'page-date';
    var iso = null;
    var repIso = null; // 季節イラスト用の代表日（週・月はページが示す期間の目安の1日）

    if (v.type === 'day') {
      iso = v.iso;
      repIso = iso;
      var d = fromISO(iso);
      var holiday = HOLIDAYS[iso] || '';
      var rokuyo = getRokuyoEnabled() ? rokuyoOf(iso) : '';
      head.innerHTML =
        '<span class="big' + (holiday ? ' is-holiday' : '') + '">' + (d.getMonth() + 1) + '月' + d.getDate() + '日' +
        '<span class="' + (holiday ? 'dow-sun' : dowClass(d)) + '">（' + DOW[d.getDay()] + '）</span></span>' +
        '<span class="small">' + warekiOf(d) + ' ' + d.getFullYear() +
        (holiday ? '<span class="holiday-name">' + holiday + '</span>' : '') +
        (rokuyo ? '<span class="rokuyo-name">' + rokuyo + '</span>' : '') +
        '</span>';
      frag.appendChild(head);

      // カレンダーの予定（印刷風）。中身はrenderPage後にloadDayEventsが入れる
      var evBox = document.createElement('div');
      evBox.className = 'page-events';
      frag.appendChild(evBox);

      // 本文: 上=きょうの計画、区切り線、下=日記
      function makeTextarea(cls, key, ph) {
        var ta = document.createElement('textarea');
        ta.className = 'page-text ' + cls;
        ta.placeholder = interactive ? ph : '';
        ta.value = localStorage.getItem(key) || '';
        ta.spellcheck = false;
        if (interactive) {
          ta.addEventListener('input', function () {
            localStorage.setItem(key, ta.value);
            if (!ta._statCounted) {
              ta._statCounted = true;
              statBump(cls === 'plan' ? 'plan' : 'diary');
            }
            flashSaved();
          });
        } else {
          ta.readOnly = true;
          ta.tabIndex = -1;
        }
        return ta;
      }
      var body = document.createElement('div');
      body.className = 'page-body';
      body.appendChild(makeTextarea('plan', keyText(iso), 'きょうの計画を書く…'));
      var divider = document.createElement('div');
      divider.className = 'page-divider';
      var dLabel = document.createElement('span');
      dLabel.className = 'label';
      dLabel.textContent = '日記';
      divider.appendChild(dLabel);
      body.appendChild(divider);
      body.appendChild(makeTextarea('diary', keyDiary(iso), 'きょうの日記…'));
      frag.appendChild(body);
    } else if (v.type === 'week') {
      repIso = addDays(v.iso, 3);
      var wStart = fromISO(v.iso);
      var wEnd = fromISO(addDays(v.iso, 6));
      var rangeStr = (wStart.getMonth() + 1) + '/' + wStart.getDate() + '〜' +
        (wEnd.getMonth() !== wStart.getMonth() ? (wEnd.getMonth() + 1) + '/' : '') + wEnd.getDate();
      head.innerHTML =
        '<span class="big">' + rangeStr + '</span>' +
        '<span class="small">' + warekiOf(wStart) + ' ' + wStart.getFullYear() + '</span>';
      frag.appendChild(head);
      frag.appendChild(buildWeekGrid(v.iso, interactive));
    } else {
      repIso = toISO(new Date(v.y, v.m - 1, 15));
      var first = new Date(v.y, v.m - 1, 1);
      head.innerHTML =
        '<span class="big">' + v.y + '年' + v.m + '月</span>' +
        '<span class="small">' + warekiOf(first) + '</span>';
      frag.appendChild(head);
      frag.appendChild(buildMonthGrid(v.y, v.m, interactive));
    }

    var topDeco = seasonDecoEl('season-deco-top', repIso);
    if (topDeco) frag.appendChild(topDeco);

    var corner = document.createElement('div');
    corner.className = 'corner-hint';
    frag.appendChild(corner);

    var bottomDeco = seasonDecoEl('season-deco-bottom', repIso);
    if (bottomDeco) frag.appendChild(bottomDeco);

    return { frag: frag, iso: iso };
  }

  // 月ビューの選択日（ミニカル方式: 1回目のタップで下にプレビュー、2回目でページへ）
  var monthSel = null;

  function hideMonthDayPanel() {
    monthSel = null;
    var p = document.getElementById('monthDayPanel');
    if (p) p.style.display = 'none';
    document.querySelectorAll('.mg-cell.selected').forEach(function (c) {
      c.classList.remove('selected');
    });
  }

  function showMonthDayPanel(iso) {
    var panel = document.getElementById('monthDayPanel');
    var dateEl = document.getElementById('mdpDate');
    var evEl = document.getElementById('mdpEvents');
    if (!panel || !dateEl || !evEl) return;
    var d = fromISO(iso);
    var holiday = HOLIDAYS[iso] || '';
    var rokuyo = getRokuyoEnabled() ? rokuyoOf(iso) : '';
    dateEl.innerHTML = (d.getMonth() + 1) + '月' + d.getDate() + '日' +
      '<span class="' + (holiday ? 'dow-sun' : dowClass(d)) + '">（' + DOW[d.getDay()] + '）</span>' +
      '<span class="mdp-sub">' + (holiday ? holiday + ' ' : '') + rokuyo + '</span>';
    evEl.innerHTML = '';
    var cached = readCachedEvents(iso);
    var list = cached ? cached.list : [];
    if (list.length === 0) {
      var empty = document.createElement('div');
      empty.className = 'mdp-empty';
      empty.textContent = '予定はありません';
      evEl.appendChild(empty);
    } else {
      // 3行まで。4件以上は2件+「ほか◯件」で収める
      var shown = list.length > 3 ? list.slice(0, 2) : list;
      shown.forEach(function (ev) {
        var line = document.createElement('div');
        var t = document.createElement('span');
        t.className = 'mdp-time';
        t.textContent = ev.time;
        line.appendChild(t);
        var titleEl = document.createElement('span');
        if (ev.color) titleEl.style.color = ev.color;
        titleEl.textContent = ev.title;
        line.appendChild(titleEl);
        evEl.appendChild(line);
      });
      if (list.length > shown.length) {
        var moreLine = document.createElement('div');
        moreLine.className = 'mdp-empty';
        moreLine.textContent = 'ほか ' + (list.length - shown.length) + ' 件';
        evEl.appendChild(moreLine);
      }
    }
    if (hasEntry(iso)) {
      var note = document.createElement('div');
      note.className = 'mdp-note';
      note.textContent = '✎ この日には書き込みがあります';
      evEl.appendChild(note);
    }
    panel.style.display = 'block';
  }

  // 月のカレンダー。書き込みがある日には鉛筆のしるし、今日は赤鉛筆の丸。
  // 1回タップで下にその日のプレビュー、もう一度タップ（またはパネルの「ひらく」）でその日のページへ
  function buildMonthGrid(y, m, interactive) {
    var grid = document.createElement('div');
    grid.className = 'month-grid';
    var ws = getWeekStart();
    for (var col = 0; col < 7; col++) {
      var dow = (ws + col) % 7;
      var h = document.createElement('div');
      h.className = 'mg-head' + (dow === 0 ? ' dow-sun' : (dow === 6 ? ' dow-sat' : ''));
      h.textContent = DOW[dow];
      grid.appendChild(h);
    }
    var startDow = (new Date(y, m - 1, 1).getDay() - ws + 7) % 7;
    var days = new Date(y, m, 0).getDate();
    var todayISO = toISO(new Date());
    var rokuyoOn = getRokuyoEnabled();
    for (var pad = 0; pad < startDow; pad++) {
      var empty = document.createElement('div');
      empty.className = 'mg-cell';
      grid.appendChild(empty);
    }
    for (var day = 1; day <= days; day++) {
      (function (day) {
        var d = new Date(y, m - 1, day);
        var iso = toISO(d);
        var cell = document.createElement('div');
        cell.className = 'mg-cell';
        var holiday = HOLIDAYS[iso] || '';
        var num = document.createElement('span');
        num.className = ('num ' + (holiday ? 'dow-sun' : dowClass(d)) + (iso === todayISO ? ' today' : '')).trim();
        num.textContent = day;
        cell.appendChild(num);
        if (rokuyoOn) {
          var rk = rokuyoOf(iso);
          if (rk) {
            var rkEl = document.createElement('span');
            rkEl.className = 'mg-rokuyo';
            rkEl.textContent = rk;
            cell.appendChild(rkEl);
          }
        }
        if (holiday) {
          var hEl = document.createElement('div');
          hEl.className = 'mg-holiday';
          hEl.textContent = holiday;
          cell.appendChild(hEl);
        }
        if (hasEntry(iso)) {
          var mark = document.createElement('span');
          mark.className = 'mark';
          cell.appendChild(mark);
        }
        // その日の予定（キャッシュから2件まで印刷）
        var cachedEv = readCachedEvents(iso);
        if (cachedEv && cachedEv.list.length) {
          var evs = document.createElement('div');
          evs.className = 'mg-evs';
          cachedEv.list.slice(0, 2).forEach(function (ev) {
            var line = document.createElement('div');
            line.className = 'mg-ev';
            line.textContent = ev.title;
            evs.appendChild(line);
          });
          if (cachedEv.list.length > 2) {
            var more = document.createElement('div');
            more.className = 'mg-ev more';
            more.textContent = '+' + (cachedEv.list.length - 2);
            evs.appendChild(more);
          }
          cell.appendChild(evs);
        }
        if (monthSel === iso) cell.classList.add('selected');
        if (interactive) {
          cell.addEventListener('click', function () {
            if (monthSel === iso) {
              flipTo('day:' + iso, 1); // 2回目のタップでページへ
              return;
            }
            monthSel = iso;
            grid.querySelectorAll('.mg-cell.selected').forEach(function (c) {
              c.classList.remove('selected');
            });
            cell.classList.add('selected');
            showMonthDayPanel(iso);
          });
        }
        grid.appendChild(cell);
      })(day);
    }
    return grid;
  }

  // 週の見開き。startIsoからの7日を横1行ずつ並べる。タップでその日のページへ（すでに情報は出ているので1回タップで直行）
  function buildWeekGrid(startIso, interactive) {
    var grid = document.createElement('div');
    grid.className = 'week-grid';
    var todayISO = toISO(new Date());
    var rokuyoOn = getRokuyoEnabled();
    for (var i = 0; i < 7; i++) {
      (function (i) {
        var iso = addDays(startIso, i);
        var d = fromISO(iso);
        var holiday = HOLIDAYS[iso] || '';
        var row = document.createElement('div');
        row.className = 'wg-row';

        var dateCol = document.createElement('div');
        dateCol.className = 'wg-date';
        var num = document.createElement('span');
        num.className = ('num ' + (holiday ? 'dow-sun' : dowClass(d)) + (iso === todayISO ? ' today' : '')).trim();
        num.textContent = d.getDate();
        dateCol.appendChild(num);
        var dowLabel = document.createElement('span');
        dowLabel.className = ('wg-dow ' + (holiday ? 'dow-sun' : dowClass(d))).trim();
        dowLabel.textContent = DOW[d.getDay()];
        dateCol.appendChild(dowLabel);
        if (holiday) {
          var hEl = document.createElement('div');
          hEl.className = 'wg-holiday';
          hEl.textContent = holiday;
          dateCol.appendChild(hEl);
        } else if (rokuyoOn) {
          var rk = rokuyoOf(iso);
          if (rk) {
            var rkEl = document.createElement('div');
            rkEl.className = 'wg-rokuyo';
            rkEl.textContent = rk;
            dateCol.appendChild(rkEl);
          }
        }
        row.appendChild(dateCol);

        var body = document.createElement('div');
        body.className = 'wg-body';
        var cachedEv = readCachedEvents(iso);
        var list = cachedEv ? cachedEv.list : [];
        if (list.length === 0) {
          var empty = document.createElement('div');
          empty.className = 'wg-empty';
          empty.textContent = '予定はありません';
          body.appendChild(empty);
        } else {
          var shown = list.length > 3 ? list.slice(0, 2) : list;
          shown.forEach(function (ev) {
            var line = document.createElement('div');
            line.className = 'wg-ev';
            var t = document.createElement('span');
            t.className = 'wg-ev-time';
            t.textContent = ev.time;
            line.appendChild(t);
            var titleEl = document.createElement('span');
            if (ev.color) titleEl.style.color = ev.color;
            titleEl.textContent = ev.title;
            line.appendChild(titleEl);
            body.appendChild(line);
          });
          if (list.length > shown.length) {
            var more = document.createElement('div');
            more.className = 'wg-ev more';
            more.textContent = 'ほか ' + (list.length - shown.length) + ' 件';
            body.appendChild(more);
          }
        }
        row.appendChild(body);

        if (hasEntry(iso)) {
          var mark = document.createElement('span');
          mark.className = 'wg-mark';
          row.appendChild(mark);
        }

        if (interactive) {
          row.addEventListener('click', function () {
            flipTo('day:' + iso, 1);
          });
        }
        grid.appendChild(row);
      })(i);
    }
    return grid;
  }

  // ---- ページの描画 ----
  // silentChrome: めくり先を事前に描くとき、タブなどの見た目はまだ切り替えない
  function renderPage(el, view, interactive, silentChrome) {
    el.innerHTML = '';
    var vType = viewParts(view).type;
    el.classList.toggle('is-month', vType === 'month' || vType === 'week');
    var built = buildPageContent(view, interactive);
    el.appendChild(built.frag);
    if (built.iso) loadDayEvents(el, built.iso); // カレンダーの予定（キャッシュ即表示＋裏で更新）
    var mv = viewParts(view);
    if (mv.type === 'month' && interactive) loadMonthEvents(mv.y, mv.m, el);
    if (mv.type === 'week' && interactive) loadWeekEvents(mv.iso, el);
    if (interactive && !silentChrome) updateChrome(view);
  }

  // タブの選択状態と鉛筆ボタンの出し分け（月・週のページに鉛筆は無い）
  function updateChrome(view) {
    var type = viewParts(view).type;
    var isDay = type === 'day';
    document.getElementById('tabDay').classList.toggle('active', isDay);
    document.getElementById('tabWeek').classList.toggle('active', type === 'week');
    document.getElementById('tabMonth').classList.toggle('active', type === 'month');
    var rpB = document.getElementById('replayBtn');
    if (rpB) rpB.style.display = isDay ? '' : 'none';
    var tdB = document.getElementById('todayBtn');
    if (tdB) tdB.textContent = isDay ? '今日' : (type === 'week' ? '今週' : '今月');
  }

  // ---- ページめくり ----
  // 指の動きに1:1で追従する（進む=0°→-178°、戻る=-178°→0°）。
  // 離したとき、進み具合としきい値・勢い（フリック）でめくり切るか元に戻すか決める
  var flipping = false;

  // めくる紙の半分（前面=ページのクローンの半分＋しなり陰影、背面=紙の裏）
  function buildLeafHalf(side, contentPaper) {
    var half = document.createElement('div');
    half.className = 'leaf-half ' + side;
    var front = document.createElement('div');
    front.className = 'face front';
    var holder = document.createElement('div');
    holder.className = 'holder';
    holder.appendChild(contentPaper);
    front.appendChild(holder);
    var shade = document.createElement('div');
    shade.className = 'leaf-shade';
    front.appendChild(shade);
    var back = document.createElement('div');
    back.className = 'face back';
    half.appendChild(front);
    half.appendChild(back);
    return half;
  }

  // 紙ごとの切り替えかた。紙=ページをめくる、黒板・電光掲示板=引き違いスライド
  // （黒板やLEDパネルは「めくれない」ので、教室の引き違い黒板の物理にする）
  function transitionStyle() {
    var p = getPaperColor();
    return (p === 'board' || p === 'led') ? 'slide' : 'flip';
  }

  // 切り替えの1回分を用意する。戻り値はハンドル {mode, el, dir, W}
  function prepareLeaf(dir, targetView) {
    var book = document.getElementById('book');
    var current = document.getElementById('currentPage');
    var under = document.getElementById('underPage');

    // 行き先は最初から「本物」（interactive）として描いておき、
    // 着地時は要素を入れ替えるだけにする（再描画ゼロ＝切り替えた瞬間から書ける）
    renderPage(under, targetView, true, true);
    under.style.pointerEvents = 'none'; // 切り替え中はまだ触れない

    if (transitionStyle() === 'slide') {
      // 連結スライド: 2枚の板が横にくっついた帯として、まとめて動く
      // （進む=次の板が右にくっついている / 戻る=前の板が左にくっついている）
      var W = book.getBoundingClientRect().width;
      under.style.transform = 'translateX(' + (dir > 0 ? W : -W) + 'px)';
      under.style.display = 'block';
      current.style.transform = 'translateX(0px)';
      [under, current].forEach(function (el) {
        el.style.transition = 'none';
        el.classList.add('board-sliding');
      });
      return { mode: 'slide', el: under, cur: current, dir: dir, W: W };
    }

    var leaf = document.createElement('div');
    leaf.className = 'leaf';
    leaf.style.transition = 'none';
    var srcEl;
    if (dir > 0) {
      // 下に行き先を見せて、今のページがめくれていく
      under.style.display = 'block';
      srcEl = current;
    } else {
      // 今のページは下に見えたまま、左から行き先が1枚戻ってくる
      srcEl = under;
    }
    var cloneA = srcEl.cloneNode(true);
    var cloneB = srcEl.cloneNode(true);
    [cloneA, cloneB].forEach(function (c) {
      c.id = '';
      c.style.display = 'block';
      c.style.visibility = 'visible';
    });
    leaf.appendChild(buildLeafHalf('hl', cloneA));
    leaf.appendChild(buildLeafHalf('hr', cloneB));

    if (dir > 0) {
      current.style.visibility = 'hidden';
      leaf.style.transform = 'rotateY(0deg)';
    } else {
      under.style.display = 'none';
      leaf.style.transform = 'rotateY(-178deg)';
    }
    book.appendChild(leaf);
    return { mode: 'flip', el: leaf, dir: dir };
  }

  // progress 0..1（1=切り替え切った状態）。
  // 紙のしなり: 外側の半分が sin カーブで遅れてついてくる（めくり途中が最大、両端で平ら）
  var LEAF_BEND_DEG = 15;

  function setLeafProgress(t, progress) {
    if (t.mode === 'slide') {
      // 帯ごと動かす: 今の板と行き先の板は常にW（画面幅）だけ離れてくっついている
      var shift = progress * t.W;
      var sign = t.dir > 0 ? 1 : -1;
      t.cur.style.transform = 'translateX(' + (-sign * shift).toFixed(1) + 'px)';
      t.el.style.transform = 'translateX(' + (sign * (t.W - shift)).toFixed(1) + 'px)';
      return;
    }
    var leaf = t.el;
    var dir = t.dir;
    var angle = dir > 0 ? -progress * 178 : -178 + progress * 178;
    var wave = Math.sin(progress * Math.PI);
    var bend = (dir > 0 ? 1 : -1) * LEAF_BEND_DEG * wave;
    leaf.style.transform = 'rotateY(' + angle + 'deg)';
    var hr = leaf.querySelector('.leaf-half.hr');
    if (hr) hr.style.transform = 'rotateY(' + bend.toFixed(2) + 'deg)';
    leaf.querySelectorAll('.leaf-shade').forEach(function (s) {
      s.style.opacity = (wave * 0.9).toFixed(3);
    });
    var shadow = document.getElementById('flipShadow');
    if (shadow) shadow.style.opacity = (wave * 0.85).toFixed(3);
  }

  // めくり確定: 事前に描いてあった行き先(under)と今のページを入れ替えるだけ。
  // 再描画しないので一瞬で終わり、めくった直後から次の操作ができる。
  // deferVisual=true（戻りめくり）のときは、状態だけ先に確定して
  // 見た目の入れ替え関数を返す（紙が着地してから呼ぶ）。
  // 戻りでは着地まで「離れる日のページ」が下に見えているのが物理的に正しく、
  // 先に入れ替えると行き先の日の予定が一瞬透けて見えてしまう
  function commitPages(targetView, deferVisual) {
    var current = document.getElementById('currentPage');
    var under = document.getElementById('underPage');
    under.id = 'currentPage';
    current.id = 'underPage';
    under.style.pointerEvents = '';
    hideMonthDayPanel();
    currentView = targetView;
    var v = viewParts(targetView);
    if (v.type === 'day') currentISO = v.iso;
    statBump('flip');
    updateChrome(targetView);
    function finishVisual() {
      under.style.display = 'block';
      under.style.visibility = 'visible';
      current.style.display = 'none';
      current.style.visibility = 'visible';
    }
    if (deferVisual) return finishVisual;
    finishVisual();
    return null;
  }

  // 着地アニメの後片付け（進行中なら早送りで即座に呼べる）
  var pendingSettle = null; // { timer, cleanup }

  function finishSettleNow() {
    if (!pendingSettle) return;
    clearTimeout(pendingSettle.timer);
    var cleanup = pendingSettle.cleanup;
    pendingSettle = null;
    cleanup();
  }

  // 離した後の着地。commit=trueでめくり切り、falseで元に戻す。
  // 状態の確定はアニメの「開始時」に済ませ、470ms後の後片付けは見た目だけ。
  // だから着地アニメ中でも次のめくりを始められる（finishSettleNowで早送り）
  function settleLeaf(t, commit, targetView) {
    var ease = 'cubic-bezier(0.3, 0.1, 0.3, 1)';
    var dir = t.dir;

    if (t.mode === 'slide') {
      var slider = t.el;
      var finishVisualSlide = null;
      if (commit) {
        // スライドは両方向とも、見た目の入れ替えは板が滑り切ってから
        finishVisualSlide = commitPages(targetView, true);
      }
      var sign = dir > 0 ? 1 : -1;
      [slider, t.cur].forEach(function (el) {
        el.style.transition = 'transform 0.42s ' + ease;
      });
      requestAnimationFrame(function () {
        if (commit) {
          slider.style.transform = 'translateX(0px)';               // 行き先が着地
          t.cur.style.transform = 'translateX(' + (-sign * t.W) + 'px)'; // 今の板は反対側へ抜ける
        } else {
          slider.style.transform = 'translateX(' + (sign * t.W) + 'px)'; // 帯ごと元の位置へ
          t.cur.style.transform = 'translateX(0px)';
        }
      });
      var cleanupSlide = function () {
        if (finishVisualSlide) finishVisualSlide();
        if (!commit) {
          var underNow = document.getElementById('underPage');
          if (underNow) underNow.style.display = 'none';
        }
        // 滑らせた板のインラインを掃除（両ページとも安全に）
        ['currentPage', 'underPage'].forEach(function (id) {
          var el = document.getElementById(id);
          if (!el) return;
          el.style.transition = 'none';
          el.style.transform = '';
          el.style.zIndex = '';
          el.classList.remove('board-sliding');
        });
        flipping = false;
      };
      pendingSettle = { cleanup: cleanupSlide, timer: setTimeout(function () {
        pendingSettle = null;
        cleanupSlide();
      }, 470) };
      return;
    }

    var leaf = t.el;
    var shadow = document.getElementById('flipShadow');
    var finishVisual = null;
    if (commit) {
      // 戻りめくり(dir<0)は見た目の入れ替えを着地まで遅らせる
      finishVisual = commitPages(targetView, dir < 0);
    } else {
      // 取り消し: 元のページを見せ直す
      var current = document.getElementById('currentPage');
      var under = document.getElementById('underPage');
      if (dir > 0) current.style.visibility = 'visible';
      under.style.display = 'none';
    }
    leaf.style.transition = 'transform 0.42s ' + ease;
    var hr = leaf.querySelector('.leaf-half.hr');
    if (hr) hr.style.transition = 'transform 0.42s ' + ease;
    if (shadow) shadow.style.transition = 'opacity 0.42s ' + ease;
    leaf.querySelectorAll('.leaf-shade').forEach(function (s) {
      s.style.transition = 'opacity 0.42s ' + ease;
    });
    requestAnimationFrame(function () {
      if (commit) {
        leaf.style.transform = dir > 0 ? 'rotateY(-178deg)' : 'rotateY(0deg)';
      } else {
        leaf.style.transform = dir > 0 ? 'rotateY(0deg)' : 'rotateY(-178deg)';
      }
      if (hr) hr.style.transform = 'rotateY(0deg)';
      if (shadow) shadow.style.opacity = '0';
      leaf.querySelectorAll('.leaf-shade').forEach(function (s) { s.style.opacity = '0'; });
    });
    function cleanup() {
      if (finishVisual) finishVisual(); // 戻りめくりの見た目入れ替え（着地後）
      if (shadow) {
        shadow.style.transition = 'none';
        shadow.style.opacity = '0';
        shadow.classList.remove('pulse');
      }
      if (leaf.parentNode) leaf.parentNode.removeChild(leaf);
      flipping = false;
    }
    pendingSettle = { cleanup: cleanup, timer: setTimeout(function () {
      pendingSettle = null;
      cleanup();
    }, 470) };
  }

  // ---- ページ再生（書いた内容が1文字ずつ現れる演出） ----
  // 予定→計画→日記の順に文字が現れ、最後に手書きの線が「実際に書いた速さ」で走る
  // （筆跡のdt=点の間隔msを保存してあるので、それを再生する。長い休みは28msに丸める）
  // 要素内のテキストノードを順番に集める（色付きspanが混ざる日付や予定を
  // 「見た目の順で1文字ずつ」出すために、ノード単位で空にして戻す）
  function textNodesOf(el) {
    var out = [];
    (function walk(n) {
      for (var i = 0; i < n.childNodes.length; i++) {
        var c = n.childNodes[i];
        if (c.nodeType === 3 && c.nodeValue) out.push({ node: c, full: c.nodeValue });
        else if (c.nodeType === 1) walk(c);
      }
    })(el);
    return out;
  }

  var replayState = null; // { finish }

  function isReplaying() { return !!replayState; }

  function finishReplayNow() {
    if (replayState) replayState.finish();
  }

  function startReplay() {
    if (replayState) { finishReplayNow(); return; }
    var v = viewParts(currentView);
    if (v.type !== 'day') return;
    var iso = v.iso;
    var root = document.getElementById('currentPage');
    var book = document.getElementById('book');
    var btn = document.getElementById('replayBtn');
    var plan = root.querySelector('.page-text.plan');
    var diary = root.querySelector('.page-text.diary');
    var evLines = Array.prototype.slice.call(root.querySelectorAll('.page-event'));
    var fullPlan = plan.value;
    var fullDiary = diary.value;
    if (!fullPlan && !fullDiary && evLines.length === 0) return; // 白紙は再生しない

    // 日付ヘッダーと予定のテキストノード（色付きspan込み・見た目の順）
    var headNodes = textNodesOf(root.querySelector('.page-date'));
    var evNodeGroups = evLines.map(function (el) { return textNodesOf(el); });

    // まっさらにする
    plan.value = '';
    diary.value = '';
    headNodes.forEach(function (t) { t.node.nodeValue = ''; });
    evNodeGroups.forEach(function (g) { g.forEach(function (t) { t.node.nodeValue = ''; }); });

    var timers = [];
    var finished = false;
    function finish() {
      if (finished) return;
      finished = true;
      timers.forEach(clearTimeout);
      plan.value = fullPlan;
      diary.value = fullDiary;
      headNodes.forEach(function (t) { t.node.nodeValue = t.full; });
      evNodeGroups.forEach(function (g) { g.forEach(function (t) { t.node.nodeValue = t.full; }); });
      book.classList.remove('replaying');
      btn.classList.remove('playing');
      btn.textContent = '▶';
      replayState = null;
    }
    replayState = { finish: finish };
    book.classList.add('replaying');
    btn.classList.add('playing');
    btn.textContent = '⏹';

    function at(t, fn) { timers.push(setTimeout(fn, t)); }

    // 文字の速さ: 全体が長くても間延びしないように調整
    var headChars = headNodes.reduce(function (s, t) { return s + t.full.length; }, 0);
    var evChars = evNodeGroups.reduce(function (s, g) {
      return s + g.reduce(function (s2, t) { return s2 + t.full.length; }, 0);
    }, 0);
    var totalChars = headChars + evChars + fullPlan.length + fullDiary.length;
    var typeDelay = Math.max(28, Math.min(80, Math.round(5600 / Math.max(1, totalChars))));

    // テキストノード列を1文字ずつ出すスケジューラ
    function typeNodes(nodes, delay) {
      nodes.forEach(function (item) {
        var full = item.full;
        for (var i = 1; i <= full.length; i++) {
          (function (i) {
            at(t, function () { item.node.nodeValue = full.slice(0, i); });
          })(i);
          t += delay;
        }
      });
    }

    var t = 350;
    // 日付が書かれていく
    typeNodes(headNodes, Math.min(70, typeDelay + 15));
    t += 300;
    // 予定が1行ずつ、1文字ずつ「印刷」されていく
    evNodeGroups.forEach(function (g) {
      typeNodes(g, typeDelay);
      t += 180;
    });
    t += 200;
    // 計画が1文字ずつ
    fullPlan.split('').forEach(function (ch, i) {
      at(t, function () { plan.value = fullPlan.slice(0, i + 1); });
      t += (ch === '\n' ? 180 : typeDelay);
    });
    t += 400;
    // 日記が1文字ずつ
    fullDiary.split('').forEach(function (ch, i) {
      at(t, function () { diary.value = fullDiary.slice(0, i + 1); });
      t += (ch === '\n' ? 180 : typeDelay);
    });
    at(t + 250, finish);
  }

    // 進行中の着地があれば早送りして、新しいめくりを始められる状態にする。
  // それでも塞がっていればfalse（ドラッグ操作中など）
  function readyForFlip() {
    finishReplayNow(); // 再生中なら即完了させてから
    if (flipping && pendingSettle) finishSettleNow();
    return !flipping;
  }

  // ボタン・タブからの切り替え（一気に。めくりのしなりはCSSアニメで）
  function flipTo(nextView, dir) {
    if (!readyForFlip() || nextView === currentView) return;
    flipping = true;
    var t = prepareLeaf(dir, nextView);
    if (t.mode === 'flip') {
      t.el.classList.add(dir > 0 ? 'auto-fwd' : 'auto-back');
      var shadow = document.getElementById('flipShadow');
      if (shadow) shadow.classList.add('pulse');
    }
    requestAnimationFrame(function () {
      requestAnimationFrame(function () {
        settleLeaf(t, true, nextView);
      });
    });
  }

  // ---- 操作 ----
  document.getElementById('nextBtn').addEventListener('click', function () {
    flipTo(stepView(currentView, 1), 1);
  });
  document.getElementById('replayBtn').addEventListener('click', function () {
    statBump('osarai');
    startReplay();
  });
  document.getElementById('prevBtn').addEventListener('click', function () {
    flipTo(stepView(currentView, -1), -1);
  });
  document.getElementById('todayBtn').addEventListener('click', function () {
    var v = viewParts(currentView);
    if (v.type === 'month') {
      // 月カレンダーを見ているときは「今月」へ
      var ym = toISO(new Date()).slice(0, 7);
      var cur = v.y + '-' + String(v.m).padStart(2, '0');
      flipTo('month:' + ym, ym > cur ? 1 : -1);
      return;
    }
    if (v.type === 'week') {
      // 週の見開きを見ているときは「今週」へ（currentISOは日ページを離れると更新されないので実際の今日から計算する）
      var thisWeekStart = weekStartISO(toISO(new Date()));
      flipTo('week:' + thisWeekStart, thisWeekStart > v.iso ? 1 : -1);
      return;
    }
    var t = toISO(new Date());
    flipTo('day:' + t, t > v.iso ? 1 : -1);
  });
  // インデックスタブ: 月のカレンダーへ／週の見開きへ／日のページへ帰る
  document.getElementById('tabMonth').addEventListener('click', function () {
    statBump('month');
    flipTo('month:' + currentISO.slice(0, 7), 1);
  });
  document.getElementById('tabWeek').addEventListener('click', function () {
    statBump('week');
    flipTo('week:' + weekStartISO(currentISO), 1);
  });
  document.getElementById('tabDay').addEventListener('click', function () {
    // 月ビューで日を選んでいれば、その日を開く（選んでいなければ元いた日へ）
    var target = monthSel || currentISO;
    flipTo('day:' + target, target > currentISO ? 1 : -1);
  });

  // 指の動きに追従するめくり。
  // 横に動き始めた瞬間に1枚つくり、指のXに合わせて角度を更新。
  // 離したら「4割超えた or フリックの勢い」でめくり切る、それ以外は元に戻る
  (function () {
    var book = document.getElementById('book');
    var startX = null, startY = null;
    var active = null; // { leaf, dir, targetISO, width, progress, lastX, lastT, vel }

    book.addEventListener('pointerdown', function (ev) {
      // 前のめくりの着地中なら早送りして、すぐ次をめくれるようにする
      if (flipping && !readyForFlip()) { startX = null; return; }
      startX = ev.clientX;
      startY = ev.clientY;
      active = null;
    });

    book.addEventListener('pointermove', function (ev) {
      if (startX == null) return;
      var dx = ev.clientX - startX;
      var dy = ev.clientY - startY;
      if (!active) {
        // 横方向の意思がはっきりしてからめくり始める（縦スクロールと衝突させない）
        if (Math.abs(dx) < 14 || Math.abs(dx) < Math.abs(dy) * 1.4) return;
        if (!readyForFlip()) { startX = null; return; }
        var dir = dx < 0 ? 1 : -1;
        var targetView = stepView(currentView, dir);
        flipping = true;
        active = {
          dir: dir,
          targetView: targetView,
          turn: prepareLeaf(dir, targetView),
          width: book.getBoundingClientRect().width,
          progress: 0,
          lastX: ev.clientX,
          lastT: ev.timeStamp,
          vel: 0
        };
        try { book.setPointerCapture(ev.pointerId); } catch (e) { /* 合成イベント等 */ }
      }
      var raw = (active.dir > 0 ? -dx : dx) / (active.width * 0.9);
      active.progress = Math.min(1, Math.max(0, raw));
      var dt = Math.max(1, ev.timeStamp - active.lastT);
      active.vel = (ev.clientX - active.lastX) / dt; // px/ms（符号つき）
      active.lastX = ev.clientX;
      active.lastT = ev.timeStamp;
      setLeafProgress(active.turn, active.progress);
      ev.preventDefault();
    });

    function release() {
      startX = null;
      if (!active) return;
      // フリック: めくる方向への勢いなら進み具合が浅くても確定、逆方向なら取り消し
      var flingCommit = active.dir > 0 ? active.vel < -0.35 : active.vel > 0.35;
      var flingCancel = active.dir > 0 ? active.vel > 0.35 : active.vel < -0.35;
      var commit = flingCommit || (active.progress > 0.4 && !flingCancel);
      settleLeaf(active.turn, commit, active.targetView);
      active = null;
    }
    book.addEventListener('pointerup', release);
    book.addEventListener('pointercancel', release);
  })();

  // ---- 起動 ----
  applyPaperColor();
  applyWriteFont();
  renderPage(document.getElementById('currentPage'), currentView, true);
  statBump('open');
  statsFlush();

  // ---- つかいかたの統計（匿名・数だけ） ----
  // 送るのは回数と、選択中の紙/字のID、連携の有無だけ。書いた内容は一切送らない。
  // 匿名ID（ランダム）で1日1回まとめて送信。設定でオフにできる（pt:stats=0）
  function statsEnabled() {
    return localStorage.getItem('pt:stats') !== '0';
  }

  function statBump(name) {
    try {
      if (!statsEnabled()) return;
      var p = JSON.parse(localStorage.getItem('pt:stats-pending') || '{}');
      p[name] = (p[name] || 0) + 1;
      localStorage.setItem('pt:stats-pending', JSON.stringify(p));
    } catch (e) { /* 統計は失敗しても本体に影響させない */ }
  }

  function statsFlush() {
    try {
      if (!statsEnabled()) return;
      // 開発中（localhost等）は送らない
      if (location.hostname !== 'michael-anderson-official.github.io' && !isNativeApp() && !window._ptStatsTest) return;
      var today = toISO(new Date());
      if (localStorage.getItem('pt:stats-sent') === today) return;
      var id = localStorage.getItem('pt:anon-id');
      if (!id) {
        id = randomBase64Url(12);
        localStorage.setItem('pt:anon-id', id);
      }
      var pending = JSON.parse(localStorage.getItem('pt:stats-pending') || '{}');
      var payload = {
        id: id,
        d: today,
        m: pending,
        v: getPaperColor() + '/' + getWriteFont() + '/' + (gcalConnected() ? '1' : '0')
      };
      fetch(WORKER_URL + '/techo/stat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      }).then(function (res) {
        if (res.ok) {
          localStorage.setItem('pt:stats-sent', today);
          localStorage.removeItem('pt:stats-pending');
        }
      }).catch(function () { /* 圏外などは次回に持ち越し */ });
    } catch (e) { /* 統計は失敗しても本体に影響させない */ }
  }

  // ---- Googleカレンダー連携 ----
  // 一週間の計画帳と同じWorker基盤を流用（認可コード→Workerがrefresh tokenをKVに保管、
  // ブラウザには短命のaccess tokenとセッション秘密情報だけ）。
  // localStorageは同一オリジン（github.io）で計画帳と共有されるため、キーは pt: 接頭辞で分離。
  // iCloudカレンダーはネイティブ化（EventKit）のときに追加する方針（2026-07-13ユーザー決定）
  var WORKER_URL = 'https://keikakuchou-notify.keikakuchou-app.workers.dev';
  var GOOGLE_CLIENT_ID = '313439643849-h299dp5h354joksqhuegfp4s89oc2dkd.apps.googleusercontent.com';
  // events.readonly: 予定の読み取り / calendarlist.readonly: カレンダー一覧（複数カレンダー対応）
  var GCAL_SCOPE = 'https://www.googleapis.com/auth/calendar.events.readonly https://www.googleapis.com/auth/calendar.calendarlist.readonly';
  var gcalCodeClient = null;
  var gcalAccessToken = null;
  var gcalTokenExpiresAt = 0;

  (function restoreGcalToken() {
    try {
      var saved = JSON.parse(localStorage.getItem('pt:google-token') || 'null');
      if (saved && saved.token && saved.expiresAt && Date.now() < saved.expiresAt) {
        gcalAccessToken = saved.token;
        gcalTokenExpiresAt = saved.expiresAt;
      }
    } catch (e) { /* 壊れた保存値は無視 */ }
  })();

  function randomBase64Url(bytes) {
    var arr = new Uint8Array(bytes);
    crypto.getRandomValues(arr);
    var str = '';
    for (var i = 0; i < arr.length; i++) str += String.fromCharCode(arr[i]);
    return btoa(str).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/g, '');
  }

  function gcalSession(createIfMissing) {
    var id = localStorage.getItem('pt:gcal-session-id');
    var secret = localStorage.getItem('pt:gcal-session-secret');
    if ((!id || !secret) && createIfMissing) {
      id = randomBase64Url(18);
      secret = randomBase64Url(32);
      localStorage.setItem('pt:gcal-session-id', id);
      localStorage.setItem('pt:gcal-session-secret', secret);
    }
    if (!id || !secret) return null;
    return { sessionId: id, sessionSecret: secret };
  }

  function gcalConnected() {
    return !!gcalSession(false);
  }

  function storeGcalToken(token, expiresIn) {
    gcalAccessToken = token;
    gcalTokenExpiresAt = Date.now() + ((parseInt(expiresIn, 10) || 3600) * 1000) - 60000;
    localStorage.setItem('pt:google-token', JSON.stringify({ token: token, expiresAt: gcalTokenExpiresAt }));
  }

  function clearGcal() {
    gcalAccessToken = null;
    gcalTokenExpiresAt = 0;
    localStorage.removeItem('pt:google-token');
    localStorage.removeItem('pt:gcal-session-id');
    localStorage.removeItem('pt:gcal-session-secret');
    localStorage.removeItem('pt:gcal-cals');
    localStorage.removeItem('pt:gcal-scope-old');
    // 予定のキャッシュも消す（プライバシー）
    var doomed = [];
    for (var i = 0; i < localStorage.length; i++) {
      var k = localStorage.key(i);
      if (k && k.indexOf('pt:events:') === 0) doomed.push(k);
    }
    doomed.forEach(function (k) { localStorage.removeItem(k); });
  }

  function applyGcalTokenResponse(data) {
    if (!data || !data.access_token) throw new Error('トークン取得に失敗しました');
    storeGcalToken(data.access_token, data.expires_in);
    return data;
  }

  function gcalExchangeCode(code) {
    var session = gcalSession(true);
    return fetch(WORKER_URL + '/google/code', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        sessionId: session.sessionId,
        sessionSecret: session.sessionSecret,
        code: code,
        redirectUri: window.location.origin,
        clientId: GOOGLE_CLIENT_ID
      })
    }).then(function (res) {
      return res.json().catch(function () { return {}; }).then(function (data) {
        if (!res.ok) throw new Error(data.error || '認証の保存に失敗しました');
        return applyGcalTokenResponse(data);
      });
    });
  }

  function gcalRefreshToken() {
    var session = gcalSession(false);
    if (!session) return Promise.reject(new Error('未連携'));
    return fetch(WORKER_URL + '/google/token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sessionId: session.sessionId, sessionSecret: session.sessionSecret })
    }).then(function (res) {
      return res.json().catch(function () { return {}; }).then(function (data) {
        if (!res.ok) {
          if (res.status === 401 || data.error === 'reauthorization_required') clearGcal();
          throw new Error(data.error || '認証の更新に失敗しました');
        }
        return applyGcalTokenResponse(data);
      });
    });
  }

  function ensureGcalToken() {
    if (gcalAccessToken && Date.now() < gcalTokenExpiresAt) return Promise.resolve(gcalAccessToken);
    if (gcalConnected()) {
      return gcalRefreshToken().then(function () { return gcalAccessToken; });
    }
    return Promise.reject(new Error('未連携'));
  }

  function fetchGcalApi(url, retrying) {
    return ensureGcalToken().then(function (token) {
      return fetch(url, { headers: { Authorization: 'Bearer ' + token } });
    }).then(function (res) {
      if (res.status === 401 && !retrying && gcalConnected()) {
        gcalAccessToken = null;
        gcalTokenExpiresAt = 0;
        localStorage.removeItem('pt:google-token');
        return gcalRefreshToken().then(function () { return fetchGcalApi(url, true); });
      }
      return res;
    });
  }

  // ---- その日の予定（ページ上部に「印刷」される） ----
  // ネイティブ版（Capacitor）では、Google OAuthの代わりにEventKitプラグインで
  // 端末の全カレンダー（iCloud・Googleなど）から読む。Web版はGoogle API
  function isNativeApp() {
    return !!(window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform());
  }

  function formatNativeEvTime(ev) {
    if (ev.allDay) return '終日';
    var st = new Date(ev.start);
    var s = st.getHours() + ':' + String(st.getMinutes()).padStart(2, '0');
    if (ev.end) {
      var et = new Date(ev.end);
      s += '〜' + et.getHours() + ':' + String(et.getMinutes()).padStart(2, '0');
    }
    return s;
  }

  function fetchDayEventsNative(iso) {
    var dayStart = fromISO(iso);
    var dayEnd = new Date(dayStart);
    dayEnd.setDate(dayStart.getDate() + 1);
    return window.Capacitor.Plugins.DeviceCalendar.listEvents({
      from: dayStart.getTime(),
      to: dayEnd.getTime()
    }).then(function (res) {
      var all = ((res && res.events) || []).map(function (ev) {
        return {
          time: formatNativeEvTime(ev),
          title: ev.title || '(タイトルなし)',
          sort: ev.allDay ? 0 : ev.start
        };
      });
      all.sort(function (a, b) { return a.sort - b.sort; });
      var list = all.map(function (ev) { return { time: ev.time, title: ev.title }; });
      localStorage.setItem('pt:events:' + iso, JSON.stringify({ t: Date.now(), list: list }));
      return list;
    });
  }

  function readCachedEvents(iso) {
    try {
      var c = JSON.parse(localStorage.getItem('pt:events:' + iso) || 'null');
      return c && Array.isArray(c.list) ? c : null;
    } catch (e) {
      return null;
    }
  }

  function formatEvTime(ev) {
    if (ev.start && ev.start.dateTime) {
      var st = new Date(ev.start.dateTime);
      var s = st.getHours() + ':' + String(st.getMinutes()).padStart(2, '0');
      if (ev.end && ev.end.dateTime) {
        var et = new Date(ev.end.dateTime);
        s += '〜' + et.getHours() + ':' + String(et.getMinutes()).padStart(2, '0');
      }
      return s;
    }
    return '終日';
  }

  // ユーザーのカレンダー一覧（24時間キャッシュ）。
  // Googleの「日本の祝日」等の祝日カレンダーは、こちらで祝日を印刷済みなので二重表示を避けて除外。
  // 旧スコープ（一覧の権限なし）で連携済みの場合は403になるので、メインのみ＋設定に案内を出す
  function listGcalCalendars(force) {
    try {
      var cached = JSON.parse(localStorage.getItem('pt:gcal-cals') || 'null');
      if (!force && cached && Array.isArray(cached.ids) && Date.now() - cached.t < 24 * 60 * 60 * 1000) {
        return Promise.resolve(cached.ids);
      }
    } catch (e) { /* 壊れたキャッシュは無視 */ }
    return fetchGcalApi('https://www.googleapis.com/calendar/v3/users/me/calendarList?minAccessRole=reader')
      .then(function (res) {
        if (res.status === 403) {
          // 旧スコープの連携。再連携するまでメインのみ
          localStorage.setItem('pt:gcal-scope-old', '1');
          return { items: [{ id: 'primary' }] };
        }
        if (!res.ok) throw new Error('カレンダー一覧の取得に失敗しました');
        localStorage.removeItem('pt:gcal-scope-old');
        return res.json();
      }).then(function (data) {
        var kept = (data.items || []).filter(function (c) {
          if (!c.id || c.hidden) return false;
          if (c.selected === false) return false; // Googleカレンダー上で非表示のものは出さない
          if (c.id.indexOf('#holiday@group.v.calendar.google.com') !== -1) return false;
          return true;
        });
        var ids = kept.map(function (c) { return c.id; });
        if (ids.length === 0) ids = ['primary'];
        var colors = {};
        kept.forEach(function (c) { if (c.backgroundColor) colors[c.id] = c.backgroundColor; });
        localStorage.setItem('pt:gcal-cals', JSON.stringify({ t: Date.now(), ids: ids, colors: colors }));
        return ids;
      });
  }

  // カレンダーの色（Googleカレンダー上の色分けそのまま）。無ければnull=通常の文字色
  function gcalColorOf(calId) {
    try {
      var cached = JSON.parse(localStorage.getItem('pt:gcal-cals') || 'null');
      return (cached && cached.colors && cached.colors[calId]) || null;
    } catch (e) {
      return null;
    }
  }

  function fetchDayEvents(iso, force) {
    var dayStart = fromISO(iso);
    var dayEnd = new Date(dayStart);
    dayEnd.setDate(dayStart.getDate() + 1);
    return listGcalCalendars(force).then(function (calIds) {
      var fetches = calIds.map(function (calId) {
        var url = 'https://www.googleapis.com/calendar/v3/calendars/' + encodeURIComponent(calId) + '/events' +
          '?timeMin=' + encodeURIComponent(dayStart.toISOString()) +
          '&timeMax=' + encodeURIComponent(dayEnd.toISOString()) +
          '&singleEvents=true&orderBy=startTime&maxResults=10';
        return fetchGcalApi(url).then(function (res) {
          if (!res.ok) return { items: [] }; // 1つ失敗しても他は表示する
          return res.json();
        }).catch(function () { return { items: [] }; }).then(function (data) {
          return { data: data, color: gcalColorOf(calId) };
        });
      });
      return Promise.all(fetches);
    }).then(function (results) {
      var all = [];
      results.forEach(function (r) {
        (r.data.items || []).forEach(function (ev) {
          all.push({
            time: formatEvTime(ev),
            title: ev.summary || '(タイトルなし)',
            color: r.color,
            sort: (ev.start && ev.start.dateTime) ? new Date(ev.start.dateTime).getTime() : 0 // 終日は先頭
          });
        });
      });
      all.sort(function (a, b) { return a.sort - b.sort; });
      var list = all.map(function (ev) { return { time: ev.time, title: ev.title, color: ev.color }; });
      localStorage.setItem('pt:events:' + iso, JSON.stringify({ t: Date.now(), list: list }));
      return list;
    });
  }

  function renderEventsInto(rootEl, iso) {
    var box = rootEl.querySelector('.page-events');
    var body = rootEl.querySelector('.page-body');
    if (!box || !body) return;
    var cached = readCachedEvents(iso);
    var shown = (cached ? cached.list : []).slice(0, 5);
    box.innerHTML = '';
    shown.forEach(function (ev) {
      var line = document.createElement('div');
      line.className = 'page-event';
      var t = document.createElement('span');
      t.className = 'ev-time';
      var time = ev.time || '';
      var sep = time.indexOf('〜');
      if (sep > 0) {
        // 「12:15〜12:30」→ 1段目「12:15」・2段目「〜12:30」
        var l1 = document.createElement('span');
        l1.textContent = time.slice(0, sep);
        var l2 = document.createElement('span');
        l2.textContent = time.slice(sep);
        t.appendChild(l1);
        t.appendChild(l2);
      } else {
        var single = document.createElement('span');
        single.textContent = time; // 終日など（1段・左寄せ）
        t.appendChild(single);
      }
      line.appendChild(t);
      var titleEl = document.createElement('span');
      if (ev.color) titleEl.style.color = ev.color;
      titleEl.textContent = ev.title;
      line.appendChild(titleEl);
      box.appendChild(line);
    });
    box.style.display = shown.length ? 'block' : 'none';
    // 予定のぶんだけ本文（計画＋日記）を下の罫線へずらす（罫線1本=28px）
    body.style.top = 'calc(88px + env(safe-area-inset-top, 0px) + ' + (shown.length * 28) + 'px)';
  }

  function loadDayEvents(rootEl, iso, force) {
    renderEventsInto(rootEl, iso); // まずキャッシュを即表示（オフラインでも見える）
    var native = isNativeApp();
    if (!native && (!gcalConnected() || navigator.onLine === false)) return;
    var cached = readCachedEvents(iso);
    if (!force && cached && Date.now() - cached.t < 10 * 60 * 1000) return; // 10分は使い回す
    (native ? fetchDayEventsNative(iso) : fetchDayEvents(iso, force)).then(function () {
      if (rootEl.isConnected) renderEventsInto(rootEl, iso);
    }).catch(function () { /* オフライン・失効・権限なしは静かに諦める */ });
  }

  // 月まるごとの予定取得。日別キャッシュ（pt:events:ISO）に書き込むので、
  // 月ビューの表示と日ページのキャッシュ温めを1回のリクエストで済ませる。
  // 複数日にまたがる予定（終日・日をまたぐ時刻つき）は、かかっている日すべてに入れる
  function bucketEventInto(buckets, startMs, endMs, allDay, time, title, color, y, m) {
    var startMoment = new Date(startMs);
    var d = new Date(startMoment.getFullYear(), startMoment.getMonth(), startMoment.getDate());
    var lastMoment = new Date(Math.max(startMs, (endMs || startMs) - 1));
    var last = new Date(lastMoment.getFullYear(), lastMoment.getMonth(), lastMoment.getDate());
    var guard = 0;
    while (d <= last && guard < 62) {
      var iso = toISO(d);
      if (!buckets[iso]) buckets[iso] = [];
      buckets[iso].push({ time: time, title: title, color: color, sort: allDay ? 0 : startMs });
      d.setDate(d.getDate() + 1);
      guard++;
    }
  }

  function loadMonthEvents(y, m, rootEl, force) {
    var native = isNativeApp();
    if (!native && !gcalConnected()) return;
    if (navigator.onLine === false) return;
    var ym = y + '-' + String(m).padStart(2, '0');
    var stamp = parseInt(localStorage.getItem('pt:events-month:' + ym), 10) || 0;
    if (!force && Date.now() - stamp < 10 * 60 * 1000) return; // 10分は使い回す
    var monthStart = new Date(y, m - 1, 1);
    var monthEnd = new Date(y, m, 1);

    var fetchPromise;
    if (native) {
      fetchPromise = window.Capacitor.Plugins.DeviceCalendar.listEvents({
        from: monthStart.getTime(),
        to: monthEnd.getTime()
      }).then(function (res) {
        var buckets = {};
        ((res && res.events) || []).forEach(function (ev) {
          bucketEventInto(buckets, ev.start, ev.end, !!ev.allDay,
            formatNativeEvTime(ev), ev.title || '(タイトルなし)', null, y, m);
        });
        return buckets;
      });
    } else {
      fetchPromise = listGcalCalendars(force).then(function (calIds) {
        var fetches = calIds.map(function (calId) {
          var url = 'https://www.googleapis.com/calendar/v3/calendars/' + encodeURIComponent(calId) + '/events' +
            '?timeMin=' + encodeURIComponent(monthStart.toISOString()) +
            '&timeMax=' + encodeURIComponent(monthEnd.toISOString()) +
            '&singleEvents=true&orderBy=startTime&maxResults=250';
          return fetchGcalApi(url).then(function (res) {
            if (!res.ok) return { items: [] };
            return res.json();
          }).catch(function () { return { items: [] }; }).then(function (data) {
            return { data: data, color: gcalColorOf(calId) };
          });
        });
        return Promise.all(fetches);
      }).then(function (results) {
        var buckets = {};
        results.forEach(function (r) {
          (r.data.items || []).forEach(function (ev) {
            var allDay = !(ev.start && ev.start.dateTime);
            var startMs, endMs;
            if (allDay) {
              startMs = fromISO(ev.start.date).getTime();
              endMs = fromISO(ev.end && ev.end.date ? ev.end.date : ev.start.date).getTime(); // endは翌日を指す（排他的）
            } else {
              startMs = new Date(ev.start.dateTime).getTime();
              // 日をまたぐ時刻つき予定（深夜またぎ等）も終了日の行に出るよう、実際の終了時刻を使う
              endMs = ev.end && ev.end.dateTime ? new Date(ev.end.dateTime).getTime() : startMs;
            }
            bucketEventInto(buckets, startMs, endMs, allDay,
              formatEvTime(ev), ev.summary || '(タイトルなし)', r.color, y, m);
          });
        });
        return buckets;
      });
    }

    fetchPromise.then(function (buckets) {
      // 月内の全日を書き込む（予定なしの日も空リストで温める）
      var days = new Date(y, m, 0).getDate();
      for (var day = 1; day <= days; day++) {
        var iso = toISO(new Date(y, m - 1, day));
        var list = (buckets[iso] || []).sort(function (a, b) { return a.sort - b.sort; })
          .map(function (ev) { return { time: ev.time, title: ev.title, color: ev.color }; });
        localStorage.setItem('pt:events:' + iso, JSON.stringify({ t: Date.now(), list: list }));
      }
      localStorage.setItem('pt:events-month:' + ym, String(Date.now()));
      // まだこの月（または、この月にかかる週）を見ていたら描き直す
      var v = viewParts(currentView);
      var stillLooking = v.type === 'month' && v.y === y && v.m === m;
      if (!stillLooking && v.type === 'week') {
        for (var wi = 0; wi < 7; wi++) {
          var wd = fromISO(addDays(v.iso, wi));
          if (wd.getFullYear() === y && wd.getMonth() + 1 === m) { stillLooking = true; break; }
        }
      }
      if (rootEl && rootEl.isConnected && stillLooking) {
        renderPage(document.getElementById('currentPage'), currentView, true);
      }
    }).catch(function () { /* オフライン等は静かに */ });
  }

  // 週の見開き。またがる月ぶんだけloadMonthEventsを呼んで日別キャッシュを温める（取得・保存の仕組みは月と共通）。
  // またがる月が同じなら1回だけ呼ぶ（週の大半は1か月に収まるため重複問い合わせを避ける）
  function loadWeekEvents(startIso, rootEl, force) {
    var seen = {};
    for (var i = 0; i < 7; i++) {
      var d = fromISO(addDays(startIso, i));
      var y = d.getFullYear(), m = d.getMonth() + 1;
      var key = y + '-' + m;
      if (seen[key]) continue;
      seen[key] = true;
      loadMonthEvents(y, m, rootEl, force);
    }
  }

  // ---- メニューと設定 ----
  (function () {
    var menuBtn = document.getElementById('menuBtn');
    var menuPanel = document.getElementById('menuPanel');
    var modal = document.getElementById('settingsModal');
    var chips = document.getElementById('weekStartChips');

    menuBtn.addEventListener('click', function (ev) {
      ev.stopPropagation();
      menuPanel.style.display = menuPanel.style.display === 'none' ? 'flex' : 'none';
    });
    // メニューの外をタップしたら閉じる
    document.addEventListener('pointerdown', function (ev) {
      if (menuPanel.style.display !== 'none' && !menuPanel.contains(ev.target) && ev.target !== menuBtn) {
        menuPanel.style.display = 'none';
      }
    });

    function renderChips() {
      chips.innerHTML = '';
      var ws = getWeekStart();
      DOW.forEach(function (name, i) {
        var b = document.createElement('button');
        b.type = 'button';
        b.textContent = name;
        b.className = i === ws ? 'active' : '';
        b.addEventListener('click', function () {
          localStorage.setItem('pt:weekStart', String(i));
          renderChips();
          // 月のカレンダーを開いていたら並びを、週の見開きを開いていたら範囲を描き直す
          var vp = viewParts(currentView);
          if (vp.type === 'month') {
            renderPage(document.getElementById('currentPage'), currentView, true);
          } else if (vp.type === 'week') {
            // 表示中の週の真ん中の日を基準に計算し直す（始まりの日そのものを基準にすると、
            // 新しい週の始まりが後ろにずれる設定の時に前の週へ大きく飛んでしまうため）
            currentView = 'week:' + weekStartISO(addDays(vp.iso, 3));
            renderPage(document.getElementById('currentPage'), currentView, true);
          }
          flashSaved();
        });
        chips.appendChild(b);
      });
    }

    // 紙の色えらび（ボタン自体が紙見本になっている）
    var paperChips = document.getElementById('paperChips');
    function renderPaperChips() {
      paperChips.innerHTML = '';
      var cur = getPaperColor();
      PAPER_COLORS.forEach(function (c) {
        var locked = c[4] && !isPremiumUser();
        var b = document.createElement('button');
        b.type = 'button';
        b.className = 'paper-chip' + (c[0] === cur ? ' active' : '') + (locked ? ' locked' : '');
        b.textContent = (locked ? '🔒 ' : '') + c[1];
        b.style.background = c[2];
        b.style.color = c[3];
        b.addEventListener('click', function () {
          if (locked) return;
          localStorage.setItem('pt:paper', c[0]);
          applyPaperColor();
          renderPaperChips();
          flashSaved();
        });
        paperChips.appendChild(b);
      });
    }

    // 書くときの字えらび（無料はその字で見本表示、プレミアムは🔒）
    var fontChips = document.getElementById('fontChips');
    function renderFontChips() {
      fontChips.innerHTML = '';
      var cur = getWriteFont();
      WRITE_FONTS.forEach(function (f) {
        var locked = f[3] && !isPremiumUser();
        var b = document.createElement('button');
        b.type = 'button';
        b.className = 'paper-chip' + (f[0] === cur ? ' active' : '') + (locked ? ' locked' : '');
        b.textContent = (locked ? '🔒 ' : '') + f[1];
        if (!locked) b.style.fontFamily = f[2] + ", 'Klee One', cursive";
        b.addEventListener('click', function () {
          if (locked) {
            var note = document.getElementById('fontNote');
            if (note) note.textContent = '「' + f[1] + '」はプレミアム（準備中）で選べるようになります。';
            return;
          }
          localStorage.setItem('pt:font', f[0]);
          applyWriteFont();
          renderFontChips();
          flashSaved();
        });
        fontChips.appendChild(b);
      });
    }

    // つかいかたの統計トグル
    var statsToggle = document.getElementById('statsToggle');
    function updateStatsToggle() {
      statsToggle.classList.toggle('active', statsEnabled());
    }
    statsToggle.addEventListener('click', function () {
      localStorage.setItem('pt:stats', statsEnabled() ? '0' : '1');
      if (!statsEnabled()) {
        localStorage.removeItem('pt:stats-pending'); // オフにしたら未送信分も破棄
      }
      updateStatsToggle();
      flashSaved();
    });

    // 六曜の表示トグル
    var rokuyoToggle = document.getElementById('rokuyoToggle');
    function updateRokuyoToggle() {
      rokuyoToggle.classList.toggle('active', getRokuyoEnabled());
    }
    rokuyoToggle.addEventListener('click', function () {
      localStorage.setItem('pt:rokuyo', getRokuyoEnabled() ? '0' : '1');
      updateRokuyoToggle();
      renderPage(document.getElementById('currentPage'), currentView, true);
      flashSaved();
    });

    document.getElementById('menuSettings').addEventListener('click', function () {
      menuPanel.style.display = 'none';
      renderChips();
      renderPaperChips();
      renderFontChips();
      updateRokuyoToggle();
      updateStatsToggle();
      updateGcalUI();
      modal.style.display = 'flex';
    });
    document.getElementById('menuPrivacy').addEventListener('click', function () {
      menuPanel.style.display = 'none';
      window.open('privacy.html', '_blank');
    });
    document.getElementById('settingsClose').addEventListener('click', function () {
      modal.style.display = 'none';
    });
    modal.addEventListener('click', function (ev) {
      if (ev.target === modal) modal.style.display = 'none';
    });

    // Googleカレンダー連携（ネイティブ版はEventKitが自動で全カレンダーを読むため、この節は不要）
    function updateGcalUI() {
      var st = document.getElementById('gcalStatus');
      var btn = document.getElementById('gcalConnectBtn');
      if (!st || !btn) return;
      if (isNativeApp()) {
        st.textContent = 'iPhoneのカレンダー（iCloud・Googleなど）の予定を自動で印刷します。初回にカレンダーへのアクセス許可を求めます。';
        btn.style.display = 'none';
        return;
      }
      if (gcalConnected()) {
        st.textContent = localStorage.getItem('pt:gcal-scope-old') === '1'
          ? '連携中（メインのカレンダーのみ）。すべてのカレンダーを表示するには、一度解除してからもう一度連携してください。'
          : '連携中。すべてのカレンダーの予定がページに印刷されます。';
        btn.textContent = '連携を解除';
      } else {
        st.textContent = '未連携。連携すると、その日の予定がページに印刷されます（読み取りのみ）。';
        btn.textContent = 'Googleカレンダーと連携';
      }
    }

    document.getElementById('gcalConnectBtn').addEventListener('click', function () {
      var st = document.getElementById('gcalStatus');
      if (gcalConnected()) {
        clearGcal();
        updateGcalUI();
        renderPage(document.getElementById('currentPage'), currentView, true);
        return;
      }
      if (!window.google || !google.accounts || !google.accounts.oauth2) {
        if (st) st.textContent = 'Googleの読み込み中です。少し待ってもう一度押してください。';
        return;
      }
      if (!gcalCodeClient) {
        gcalCodeClient = google.accounts.oauth2.initCodeClient({
          client_id: GOOGLE_CLIENT_ID,
          scope: GCAL_SCOPE,
          ux_mode: 'popup',
          callback: function (response) {
            if (response && response.code) {
              if (st) st.textContent = '連携しています…';
              gcalExchangeCode(response.code).then(function () {
                updateGcalUI();
                flashSaved();
                // 今開いているページの予定をすぐ取りに行く
                renderPage(document.getElementById('currentPage'), currentView, true);
              }).catch(function (err) {
                if (st) st.textContent = (err && err.message) || '連携に失敗しました。';
              });
            } else if (st) {
              st.textContent = 'サインインできませんでした。';
            }
          }
        });
      }
      gcalCodeClient.requestCode();
    });
  })();

  // ---- 日記の書き出し（読みやすいテキストファイル） ----
  (function () {
    var exportBtn = document.getElementById('diaryExportBtn');
    var statusEl = document.getElementById('diaryExportStatus');
    if (!exportBtn) return;

    function collectDiaryEntries() {
      var re = /^pt:(\d{4}-\d{2}-\d{2}):diary$/;
      var entries = [];
      for (var i = 0; i < localStorage.length; i++) {
        var k = localStorage.key(i);
        var m = k && k.match(re);
        if (!m) continue;
        var text = (localStorage.getItem(k) || '').trim();
        if (!text) continue;
        entries.push({ iso: m[1], text: text });
      }
      entries.sort(function (a, b) { return a.iso < b.iso ? -1 : (a.iso > b.iso ? 1 : 0); });
      return entries;
    }

    function buildDiaryText(entries) {
      return entries.map(function (e) {
        var d = fromISO(e.iso);
        var holiday = HOLIDAYS[e.iso] || '';
        var rokuyo = getRokuyoEnabled() ? rokuyoOf(e.iso) : '';
        var header = d.getFullYear() + '年' + (d.getMonth() + 1) + '月' + d.getDate() + '日（' + DOW[d.getDay()] + '）' +
          (holiday ? '　' + holiday : '') + (rokuyo ? '　' + rokuyo : '');
        return header + '\n' + e.text;
      }).join('\n\n');
    }

    exportBtn.addEventListener('click', function () {
      var entries = collectDiaryEntries();
      if (entries.length === 0) {
        if (statusEl) statusEl.textContent = 'まだ書いた日記がありません。';
        return;
      }
      var text = buildDiaryText(entries);
      var blob = new Blob([text], { type: 'text/plain' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = '手ざわり手帳-日記-' + toISO(new Date()) + '.txt';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      if (statusEl) statusEl.textContent = entries.length + '日ぶんの日記を書き出しました。';
    });
  })();

  // ---- データのひかえ（バックアップ・復元） ----
  // pt:接頭辞のキーだけを対象にする（同一オリジンの他アプリのデータに触らない）
  (function () {
    var exportBtn = document.getElementById('backupExportBtn');
    var importBtn = document.getElementById('backupImportBtn');
    var importInput = document.getElementById('backupImportInput');
    var statusEl = document.getElementById('backupStatus');

    exportBtn.addEventListener('click', function () {
      var data = { app: 'tezawari-techo', version: 1, exportedAt: new Date().toISOString(), items: {} };
      for (var i = 0; i < localStorage.length; i++) {
        var k = localStorage.key(i);
        // 認証情報（トークン・セッション）はファイルに書き出さない
        if (!k || k.indexOf('pt:') !== 0) continue;
        if (k === 'pt:google-token' || k === 'pt:gcal-session-id' || k === 'pt:gcal-session-secret') continue;
        data.items[k] = localStorage.getItem(k);
      }
      var blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = '手ざわり手帳-ひかえ-' + toISO(new Date()) + '.json';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      if (statusEl) statusEl.textContent = '保存しました。ファイルは大切にしまっておいてください。';
    });

    importBtn.addEventListener('click', function () {
      importInput.click();
    });
    importInput.addEventListener('change', function () {
      var file = importInput.files && importInput.files[0];
      importInput.value = '';
      if (!file) return;
      var reader = new FileReader();
      reader.onload = function (e) {
        try {
          var data = JSON.parse(e.target.result);
          if (!data || data.app !== 'tezawari-techo' || !data.items || typeof data.items !== 'object') {
            throw new Error('形式が違います');
          }
          if (!confirm('このファイルの中身で手帳を復元します。いま書いてある同じ日のページは上書きされます。よろしいですか？')) return;
          Object.keys(data.items).forEach(function (k) {
            if (k.indexOf('pt:') === 0) localStorage.setItem(k, data.items[k]);
          });
          alert('復元しました。ページを開き直します。');
          location.reload();
        } catch (err) {
          if (statusEl) statusEl.textContent = '復元できませんでした。「手ざわり手帳のひかえ」ファイルか確認してください。';
        }
      };
      reader.readAsText(file);
    });
  })();

  // ---- フォアグラウンド復帰時にカレンダーを強制更新 ----
  // 他のアプリでGoogle/iCloudの予定を編集してから手ざわり手帳に戻ってきたとき、
  // 10分/24時間のキャッシュを待たず即座に反映する
  var lastForegroundRefresh = 0;
  function refreshCurrentViewFromForeground() {
    if (Date.now() - lastForegroundRefresh < 5000) return; // 連続発火のガード
    lastForegroundRefresh = Date.now();
    var el = document.getElementById('currentPage');
    if (!el) return;
    var v = viewParts(currentView);
    if (v.type === 'day') loadDayEvents(el, v.iso, true);
    else if (v.type === 'month') loadMonthEvents(v.y, v.m, el, true);
    else if (v.type === 'week') loadWeekEvents(v.iso, el, true);
  }
  document.addEventListener('visibilitychange', function () {
    if (document.visibilityState === 'visible') refreshCurrentViewFromForeground();
  });
  window.addEventListener('focus', refreshCurrentViewFromForeground);
  window.addEventListener('pageshow', refreshCurrentViewFromForeground);

  // テスト用フック（アプリ動作には不使用）
  window._pt = { rokuyoOf: rokuyoOf };

  // オフライン対応（Service Worker）。file://で開いたときは黙って諦める
  if ('serviceWorker' in navigator && location.protocol !== 'file:') {
    navigator.serviceWorker.register('sw.js').catch(function () { /* 未対応環境 */ });
  }
})();
</script>
